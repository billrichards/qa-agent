<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Inputs Use Placeholder as Only Label Test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
    form { max-width: 400px; }
    input, select { display: block; width: 100%; padding: 10px; margin: 8px 0 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1em; }
    button { padding: 10px 20px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <h1>Form Inputs Use Placeholder as Only Label Test Page</h1>
    <p>These inputs rely solely on <code>placeholder</code> text to identify themselves. Once a user starts typing, the placeholder disappears — leaving no visible label. There are no <code>&lt;label&gt;</code> elements, <code>aria-label</code>, or <code>title</code> attributes.</p>

    <!-- Trigger: input has placeholder but no label/aria-label/aria-labelledby/title/parent label -->

    <form>
      <input type="text" placeholder="First name" name="first_name" autocomplete="given-name">
      <input type="text" placeholder="Last name" name="last_name" autocomplete="family-name">
      <input type="email" placeholder="Email address" name="email" autocomplete="email">
      <input type="tel" placeholder="Phone number" name="phone" autocomplete="tel">
      <input type="text" placeholder="Company name" name="company">
      <input type="text" placeholder="Job title" name="title">
      <button type="submit">Sign Up</button>
    </form>

    <p><a href="index.html">Back to index</a></p>
  </main>
</body>
</html>
