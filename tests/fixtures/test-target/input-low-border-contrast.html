<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Input Borders Low Contrast Test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.6; background: #ffffff; }
    form { max-width: 400px; }
    label { display: block; margin-top: 16px; font-weight: bold; }

    /*
      Trigger: input border color vs background contrast < 3:1
      #e0e0e0 border on #ffffff background:
        luminance(#e0e0e0) ≈ 0.756
        luminance(#ffffff) = 1.0
        ratio = (1.0 + 0.05) / (0.756 + 0.05) ≈ 1.3:1  — well below 3:1
    */
    input, select, textarea {
      display: block;
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      border: 1px solid #e0e0e0;   /* very light gray border — low contrast */
      border-radius: 4px;
      background: #ffffff;
      box-sizing: border-box;
    }
    button { margin-top: 16px; padding: 10px 20px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <h1>Form Input Borders Low Contrast Test Page</h1>
    <p>These form inputs have a very light gray border (<code>#e0e0e0</code>) on a white background. The border-to-background contrast ratio is well below the 3:1 minimum required by WCAG 1.4.11.</p>

    <form>
      <label for="name">Name</label>
      <input type="text" id="name" name="name" autocomplete="name">

      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email">

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="3"></textarea>

      <label for="country">Country</label>
      <select id="country" name="country" autocomplete="country">
        <option value="">Select…</option>
        <option value="us">United States</option>
        <option value="uk">United Kingdom</option>
      </select>

      <button type="submit">Send</button>
    </form>

    <p><a href="index.html">Back to index</a></p>
  </main>
</body>
</html>
