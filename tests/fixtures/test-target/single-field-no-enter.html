<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Single-Field Form May Not Submit on Enter Test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
    form { max-width: 400px; border: 1px solid #ddd; padding: 20px; border-radius: 4px; margin: 16px 0; }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    input { display: block; width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
  </style>
</head>
<body>
  <main>
    <h1>Single-Field Form May Not Submit on Enter Test Page</h1>
    <p>These forms each contain a single text input but have no <code>onsubmit</code> handler and no submit button. The agent checks whether single-input forms handle Enter key submission.</p>

    <!-- Trigger: form with exactly 1 input, no button/input[type="submit"], no onsubmit handler -->

    <form id="newsletter-form">
      <label for="newsletter-email">Subscribe to newsletter</label>
      <input type="email" id="newsletter-email" name="email" placeholder="your@email.com" autocomplete="email">
      <!-- Single field, no submit button, no onsubmit -->
    </form>

    <form id="coupon-form">
      <label for="coupon-code">Enter coupon code</label>
      <input type="text" id="coupon-code" name="coupon" placeholder="SAVE20" autocomplete="off">
      <!-- Single field, no submit button, no onsubmit -->
    </form>

    <p><a href="index.html">Back to index</a></p>
  </main>
</body>
</html>
