name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  unit:
    name: Unit tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core package + dev deps
        run: pip install -e ".[dev,web]"

      - name: Run unit tests (no Playwright, no network)
        run: pytest -v -m "not integration and not network"

  integration:
    name: Integration tests (real Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core package + dev deps
        run: pip install -e ".[dev,web]"

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run integration tests
        run: pytest -v -m integration --no-cov

  install-extras:
    name: Smoke-test extras install
    runs-on: ubuntu-latest
    strategy:
      matrix:
        extra: ["pdf", "web", "all"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install with extra [${{ matrix.extra }}]
        run: pip install ".[${{ matrix.extra }}]"

      - name: Verify CLI entry point
        run: qa-agent --version

  clean-install:
    name: Clean-install smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tool
        run: pip install build

      - name: Build wheel
        run: python -m build --wheel --outdir dist/

      - name: Create fresh venv and install wheel (non-editable, with web extra)
        run: |
          python -m venv /tmp/qa-clean-venv
          /tmp/qa-clean-venv/bin/pip install --quiet dist/*.whl flask>=3.0

      - name: Verify qa-agent --version
        run: /tmp/qa-clean-venv/bin/python -m qa_agent --version

      - name: Verify Flask resolves templates from installed package data
        run: |
          /tmp/qa-clean-venv/bin/python -c "
          from qa_agent.web.server import app
          import pathlib
          tpl = pathlib.Path(app.template_folder)
          assert tpl.is_dir(), f'template_folder missing: {tpl}'
          assert (tpl / 'index.html').exists(), 'index.html not found post-install'
          print('OK — templates found at', tpl)
          "

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check qa_agent/

      - name: Run mypy
        run: mypy qa_agent/
